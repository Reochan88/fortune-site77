
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>星座判定デモ</title>
<style>
  body {
    font-family: sans-serif;
    text-align: center;
    margin-top: 50px;
  }
  input, button {
    padding: 8px;
    margin: 5px;
  }
</style>
</head>
<body>

<h2>星座チェック</h2>

<input type="date" id="date">
<button onclick="checkSign()">判定</button>

<p id="result"></p>

<script>
// ===== 通常の星座 =====
function getZodiacSign(month, day) {
  const signs = [
    { sign: "山羊座", from: [12, 22], to: [1, 19] },
    { sign: "水瓶座", from: [1, 20], to: [2, 18] },
    { sign: "魚座", from: [2, 19], to: [3, 20] },
    { sign: "牡羊座", from: [3, 21], to: [4, 19] },
    { sign: "牡牛座", from: [4, 20], to: [5, 20] },
    { sign: "双子座", from: [5, 21], to: [6, 21] },
    { sign: "蟹座", from: [6, 22], to: [7, 22] },
    { sign: "獅子座", from: [7, 23], to: [8, 22] },
    { sign: "乙女座", from: [8, 23], to: [9, 22] },
    { sign: "天秤座", from: [9, 23], to: [10, 23] },
    { sign: "蠍座", from: [10, 24], to: [11, 22] },
    { sign: "射手座", from: [11, 23], to: [12, 21] }
  ];

  for (let s of signs) {
    const [fromMonth, fromDay] = s.from;
    const [toMonth, toDay] = s.to;

    if (
      (month === fromMonth && day >= fromDay) ||
      (month === toMonth && day <= toDay)
    ) {
      return s.sign;
    }
  }
}

// ===== 黄経 → 星座 =====
function getZodiacFromLongitude(lon) {
  const signs = [
    "牡羊座","牡牛座","双子座","蟹座","獅子座","乙女座",
    "天秤座","蠍座","射手座","山羊座","水瓶座","魚座"
  ];
  return signs[Math.floor(lon / 30)];
}

// ===== 太陽の黄経（本物）=====
function getJulianDate(date) {
  return date / 86400000 + 2440587.5;
}

function getSunLongitude(date) {
  const jd = getJulianDate(date);
  const T = (jd - 2451545.0) / 36525;

  let L0 = 280.46646 + 36000.76983 * T;
  L0 = L0 % 360;

  let M = 357.52911 + 35999.05029 * T;
  M = M % 360;

  const Mrad = M * Math.PI / 180;

  const C =
    (1.914602 - 0.004817 * T) * Math.sin(Mrad) +
    0.019993 * Math.sin(2 * Mrad) +
    0.000289 * Math.sin(3 * Mrad);

  const trueLongitude = L0 + C;

  return (trueLongitude + 360) % 360;
}

// ===== 実行 =====
function checkSign() {
  const input = document.getElementById("date").value;
  if (!input) return;

  const d = new Date(input);
  const month = d.getMonth() + 1;
  const day = d.getDate();

  // 通常星座
  const normalSign = getZodiacSign(month, day);

  // 太陽黄経
  const sunLon = getSunLongitude(d);

  // ★ヘリオ（反転）
  const helioLon = (sunLon + 180) % 360;
  const helioSign = getZodiacFromLongitude(helioLon);

  document.getElementById("result").innerHTML =
    `あなたの星座は「${normalSign}」です<br>
     あなたのヘリオは「${helioSign}」です！！`;
}
</script>

</body>
</html>
